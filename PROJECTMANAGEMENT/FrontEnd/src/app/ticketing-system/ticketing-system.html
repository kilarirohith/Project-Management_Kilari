<!-- src/app/ticketing-system/ticketing-system.html -->

<!-- ✅ Notification at top-level -->
<app-notification
  [notification]="notification"
  (onClose)="onNotificationClose()">
</app-notification>

<div class="p-6 bg-gray-50 min-h-screen">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-2xl font-bold text-gray-800">Ticketing System</h1>
    <button
      class="bg-blue-600 text-white px-4 py-2 rounded"
      (click)="startCreate()">
      + New Ticket
    </button>
  </div>

  <!-- Form Card -->
  <div class="bg-white shadow rounded p-4 mb-6" *ngIf="form">
    <h2 class="text-lg font-semibold mb-3">
      {{ editingId ? 'Edit Ticket' : 'Create Ticket' }}
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium mb-1">Title</label>
        <input
          class="w-full border rounded px-3 py-2"
          [(ngModel)]="form.title"
          name="title"
          placeholder="Enter ticket title" />
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Priority</label>
        <select
          class="w-full border rounded px-3 py-2"
          [(ngModel)]="form.priority"
          name="priority">
          <option value="Low">Low</option>
          <option value="Medium">Medium</option>
          <option value="High">High</option>
        </select>
      </div>
    </div>

    <div class="mt-3">
      <label class="block text-sm font-medium mb-1">Description</label>
      <textarea
        class="w-full border rounded px-3 py-2"
        rows="3"
        [(ngModel)]="form.description"
        name="description"
        placeholder="Enter ticket description">
      </textarea>
    </div>

    <div class="flex gap-2 mt-4">
      <button
        class="bg-blue-600 text-white px-4 py-2 rounded"
        [disabled]="isSaving"
        (click)="saveTicket()">
        {{ isSaving ? 'Saving...' : (editingId ? 'Update Ticket' : 'Create Ticket') }}
      </button>
      <button
        class="bg-gray-300 px-4 py-2 rounded"
        type="button"
        (click)="cancelForm()">
        Cancel
      </button>
    </div>
  </div>

  <!-- Tickets Table -->
  <div class="bg-white shadow rounded overflow-x-auto">
    <table class="min-w-full border-collapse">
      <thead class="bg-gray-100">
        <tr>
          <th class="p-2 border text-left">Title</th>
          <th class="p-2 border text-left">Priority</th>
          <th class="p-2 border text-left">Created By</th>
          <th class="p-2 border text-left">Assigned To</th>
          <th class="p-2 border text-left">Created At</th>
          <th class="p-2 border text-left">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let t of tickets" class="hover:bg-gray-50">
          <td class="p-2 border">{{ t.title }}</td>
          <td class="p-2 border">{{ t.priority }}</td>
          <td class="p-2 border">{{ t.createdByName || '-' }}</td>
          <td class="p-2 border">{{ t.assignedToName || '-' }}</td>
          <td class="p-2 border">{{ t.dateRaised | date:'short' }}</td>
          <td class="p-2 border">
            <button
              class="bg-yellow-500 text-white px-2 py-1 rounded text-sm mr-2"
              (click)="startEdit(t)">
              Edit
            </button>
            <button
              class="bg-red-600 text-white px-2 py-1 rounded text-sm"
              (click)="deleteTicket(t.id)">
              Delete
            </button>
          </td>
        </tr>

        <tr *ngIf="tickets.length === 0 && !loading">
          <td colspan="6" class="p-3 text-center text-gray-500">
            No tickets found.
          </td>
        </tr>

        <tr *ngIf="loading">
          <td colspan="6" class="p-3 text-center text-gray-500">
            Loading tickets...
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
