<div class="user-master-page">
  <div class="user-master-inner">

    <!-- HEADER -->
    <div class="user-header">
      <div>
        <h1 class="user-title">User Master</h1>
        <p class="user-subtitle">Manage application users and their roles.</p>
      </div>

      <button
        *ngIf="!showForm"
        class="btn-primary"
        type="button"
        (click)="openForm()">
        + Add New User
      </button>
    </div>

    <!-- FORM CARD -->
    <div *ngIf="showForm" class="card user-form-card">
      <h2 class="card-title">
        {{ editingUserId ? 'Edit User' : 'Add New User' }}
      </h2>

      <form [formGroup]="userForm" (ngSubmit)="saveUser()" novalidate>
        <div class="user-form-grid">

          <!-- Full Name -->
          <div class="user-form-group">
            <label>Full Name</label>
            <input
              type="text"
              formControlName="fullName"
              placeholder="John Doe" />
          </div>

          <!-- Email -->
          <div class="user-form-group">
            <label>Email</label>
            <input
              type="email"
              formControlName="email"
              placeholder="john@company.com" />
          </div>

          <!-- Password -->
          <div class="user-form-group">
            <label>
              Password
              <span *ngIf="editingUserId" class="hint">
                (leave blank to keep current)
              </span>
            </label>
            <input
              type="password"
              formControlName="password"
              placeholder="******" />
          </div>

          <!-- Role -->
          <div class="user-form-group">
            <label>Assign Role</label>
            <select formControlName="roleId">
              <option value="" disabled>Select a Role</option>
              <option *ngFor="let r of roles" [value]="r.id">
                {{ r.name }}
              </option>
            </select>
          </div>
        </div>

        <!-- FORM BUTTONS -->
        <div class="user-form-actions">
          <button
            type="submit"
            class="btn-primary"
            [disabled]="isSaving || userForm.invalid">
            {{ isSaving ? 'Saving…' : (editingUserId ? 'Update User' : 'Create User') }}
          </button>

          <button
            type="button"
            class="btn-secondary"
            (click)="showForm = false">
            Cancel
          </button>
        </div>
      </form>
    </div>

    <!-- TABLE CARD -->
    <div class="card user-table-card">
      <div class="card-header-row">
        <h2 class="card-title">Users List</h2>
      </div>

      <div class="table-wrapper">
        <table class="user-table">
          <thead>
            <tr class="user-table-header-row">
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr
              *ngFor="let u of users"
              class="user-table-body-row">
              <td>{{ u.fullName }}</td>
              <td>{{ u.email }}</td>
              <td>
                <span class="role-pill">
                  {{ u.role?.name || 'No Role' }}
                </span>
              </td>
              <td class="actions-cell">
                <button
                  type="button"
                  class="btn-table edit"
                  (click)="editUser(u.id)">
                  Edit
                </button>
                <button
                  type="button"
                  class="btn-table delete"
                  (click)="deleteUser(u.id)">
                  Delete
                </button>
              </td>
            </tr>
          </tbody>
        </table>

        <div
          *ngIf="users.length === 0 && !loading"
          class="table-empty">
          No users found.
        </div>
      </div>
    </div>

  </div>
</div>
