<div class="p-6 bg-gray-50 min-h-screen">
  <h1 class="text-3xl font-bold mb-6 text-gray-800">User Master</h1>

  <!-- Add Button -->
  <button *ngIf="!showForm" class="btn-primary mb-4" (click)="openForm()">
    + Add New User
  </button>

  <!-- FORM -->
  <div *ngIf="showForm" class="card mb-6 p-4 bg-white shadow rounded">
    <!-- Dynamic Title -->
    <h2 class="text-xl font-bold mb-4">
      {{ editingUserId ? 'Edit User' : 'Add New User' }}
    </h2>
    
    <form [formGroup]="userForm" (ngSubmit)="saveUser()">
      
      <div class="mb-3">
        <label class="block font-semibold">Full Name</label>
        <input class="w-full border p-2 rounded" formControlName="fullName" placeholder="John Doe">
      </div>

      <div class="mb-3">
        <label class="block font-semibold">Email</label>
        <input class="w-full border p-2 rounded" type="email" formControlName="email" placeholder="john@company.com">
      </div>

      <div class="mb-3">
        <label class="block font-semibold">
          Password 
          <span *ngIf="editingUserId" class="text-gray-400 text-sm font-normal">(Leave blank to keep current)</span>
        </label>
        <input class="w-full border p-2 rounded" type="password" formControlName="password" placeholder="******">
      </div>

      <div class="mb-4">
        <label class="block font-semibold">Assign Role</label>
        <select class="w-full border p-2 rounded" formControlName="roleId">
          <option value="" disabled>Select a Role</option>
          <option *ngFor="let r of roles" [value]="r.id">
            {{ r.name }}
          </option>
        </select>
      </div>

      <div class="flex gap-2">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded" [disabled]="isSaving">
          {{ isSaving ? 'Saving...' : (editingUserId ? 'Update User' : 'Create User') }}
        </button>
        <button type="button" class="bg-gray-300 px-4 py-2 rounded" (click)="showForm = false">Cancel</button>
      </div>

    </form>
  </div>

  <!-- TABLE -->
  <div class="overflow-x-auto bg-white rounded-lg shadow">
    <table class="min-w-full">
      <thead class="bg-gray-100 border-b">
        <tr>
          <th class="p-3 text-left font-semibold text-gray-600">Name</th>
          <th class="p-3 text-left font-semibold text-gray-600">Email</th>
          <th class="p-3 text-left font-semibold text-gray-600">Role</th>
          <th class="p-3 text-left font-semibold text-gray-600">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let u of users" class="border-b hover:bg-gray-50">
          <td class="p-3">{{ u.fullName }}</td>
          <td class="p-3">{{ u.email }}</td>
          <td class="p-3">
            <span class="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm font-medium">
              {{ u.role?.name || 'No Role' }}
            </span>
            </td>
            
          <!-- Inside the Table Loop -->
         <td class="p-3 flex gap-2">
  <!-- ✅ PASS THE ID ONLY -->
        <button class="bg-yellow-500 text-white px-2 py-1 rounded text-sm" (click)="editUser(u.id)">
        Edit
      </button>
  
       <button class="bg-red-600 text-white px-2 py-1 rounded text-sm" (click)="deleteUser(u.id)">
        Delete
      </button>
      </td>
        </tr>
      </tbody>
    </table>
    
    <div *ngIf="users.length === 0 && !loading" class="p-4 text-center text-gray-500">
      No users found.
    </div>
  </div>
</div>
